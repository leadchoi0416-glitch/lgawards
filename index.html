<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>The Grand Awards — 좌석 안내</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c86a;
    --gold-dim: #a07a30;
    --bg: #0b0b10;
    --bg2: #13131c;
    --bg3: #1a1a26;
    --border: rgba(201,168,76,0.15);
    --border2: rgba(201,168,76,0.3);
    --text: #f0e8d0;
    --text-muted: #8a7d60;
    --text-dim: #4a4438;
    --red: #c04a4a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── STARS BG ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(201,168,76,.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 8%,  rgba(201,168,76,.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 60%, rgba(201,168,76,.20) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 42%, rgba(201,168,76,.30) 0%, transparent 100%),
      radial-gradient(1px 1px at 5%  80%, rgba(201,168,76,.20) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 90%, rgba(201,168,76,.18) 0%, transparent 100%),
      radial-gradient(1px 1px at 93% 75%, rgba(201,168,76,.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 28% 38%, rgba(201,168,76,.15) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 60px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 14px;
  }

  .header-badge::before,
  .header-badge::after {
    content: '';
    width: 30px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .header-badge::after { transform: scaleX(-1); }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.5px;
  }

  .header-sub {
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  .ornament {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
    margin-top: 16px;
    color: var(--gold-dim);
    font-size: 12px;
    letter-spacing: 6px;
  }
  .ornament::before,
  .ornament::after {
    content: '';
    width: 50px;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, var(--gold-dim));
  }
  .ornament::after { transform: scaleX(-1); }

  /* ── CARD ── */
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ── VIEWS ── */
  .view { display: none; animation: fadeSlide .4s ease; }
  .view.active { display: block; }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── AUTH VIEW ── */
  .view-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 24px;
  }

  .dots-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1px solid var(--text-dim);
    background: transparent;
    transition: all .25s ease;
  }

  .dot.filled {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(201,168,76,.4);
  }

  .inp-wrap {
    position: relative;
    margin-bottom: 24px;
  }

  .inp {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 32px;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    text-align: center;
    letter-spacing: 16px;
    padding: 20px 16px;
    outline: none;
    transition: border-color .2s;
    caret-color: var(--gold);
  }

  .inp::placeholder { color: var(--text-dim); letter-spacing: 8px; font-size: 24px; }
  .inp:focus { border-color: var(--border2); }

  .find-btn {
    width: 100%;
    padding: 18px;
    background: var(--gold);
    border: none;
    border-radius: 10px;
    color: #0b0b10;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    cursor: pointer;
    opacity: .4;
    pointer-events: none;
    transition: all .25s;
    position: relative;
    overflow: hidden;
  }

  .find-btn.active {
    opacity: 1;
    pointer-events: all;
  }

  .find-btn.active:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  .find-btn.active:active { transform: scale(.98); }

  .err {
    text-align: center;
    font-size: 12px;
    color: var(--red);
    margin-top: 14px;
    min-height: 18px;
    letter-spacing: 0.5px;
  }

  /* ── PICK VIEW ── */
  .pick-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .pick-list { display: flex; flex-direction: column; gap: 10px; }

  .pick-item {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color .2s, background .2s;
  }

  .pick-item:hover {
    border-color: var(--border2);
    background: #1e1e2e;
  }

  .pick-item:active { transform: scale(.99); }

  .avatar {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    border-radius: 50%;
    background: rgba(201,168,76,.1);
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
  }

  .pick-name { font-size: 16px; font-weight: 500; color: var(--text); }
  .pick-hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; letter-spacing: 1px; }

  /* ── RESULT VIEW ── */
  .r-greeting {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 6px;
  }

  .r-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    margin-bottom: 24px;
  }

  .r-seat-box {
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 22px;
    text-align: center;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }

  .r-seat-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .r-seat-label {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .r-seat-num {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 30px rgba(201,168,76,.3);
  }

  .r-zone {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-top: 8px;
  }

  /* ── MINI MAP ── */
  .map-wrap {
    margin-top: 20px;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 18px 14px;
  }

  .map-title {
    font-size: 9px;
    letter-spacing: 4px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 14px;
  }

  .stage-bar {
    background: rgba(201,168,76,.1);
    border: 0.5px solid var(--border2);
    border-radius: 6px;
    text-align: center;
    padding: 7px;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .seat-grid { display: flex; flex-direction: column; gap: 5px; }
  .seat-row { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }

  .seat {
    width: 24px;
    height: 24px;
    border-radius: 4px;
    border: 0.5px solid transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 6px;
    font-weight: 500;
    transition: all .3s;
    cursor: default;
  }

  .seat.zone-a { background: #14182a; border-color: #242a50; color: #4a5080; }
  .seat.zone-b { background: #142218; border-color: #244030; color: #446040; }
  .seat.zone-c { background: #221414; border-color: #502424; color: #806040; }

  .seat.mine {
    background: var(--gold) !important;
    border-color: var(--gold-light) !important;
    color: #0b0b10 !important;
    font-size: 10px;
    font-weight: 700;
    box-shadow: 0 0 0 0 rgba(201,168,76,.6);
    animation: seatPulse 1.6s ease-in-out infinite;
  }

  @keyframes seatPulse {
    0%   { box-shadow: 0 0 0 0   rgba(201,168,76,.6); }
    60%  { box-shadow: 0 0 0 7px rgba(201,168,76,.0); }
    100% { box-shadow: 0 0 0 0   rgba(201,168,76,.0); }
  }

  .map-legend {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .leg-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── BACK BTN ── */
  .back-btn {
    width: 100%;
    margin-top: 18px;
    padding: 12px;
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all .2s;
  }
  .back-btn:hover { border-color: var(--border2); color: var(--gold); }

  /* ── FOOTER ── */
  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-badge">THE GRAND AWARDS</div>
    <h1>Seat Finder</h1>
    <p class="header-sub">2025 ANNUAL CEREMONY</p>
    <div class="ornament">✦</div>
  </header>

  <div class="card">
    <!-- AUTH -->
    <div class="view active" id="view-auth">
      <p class="view-label">전화번호 뒷자리 4자리를 입력하세요</p>
      <div class="dots-row">
        <div class="dot" id="d0"></div>
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
      </div>
      <div class="inp-wrap">
        <input class="inp" id="phone-input" type="tel" inputmode="numeric"
               maxlength="4" placeholder="0000" autocomplete="off"/>
      </div>
      <button class="find-btn" id="find-btn" onclick="doFind()">좌석 확인하기</button>
      <p class="err" id="err-msg"></p>
    </div>

    <!-- PICK (중복) -->
    <div class="view" id="view-pick">
      <p class="pick-label">동일 번호로 2명이 조회됩니다.<br>본인을 선택해 주세요.</p>
      <div class="pick-list" id="pick-list"></div>
      <button class="back-btn" onclick="goAuth()">← 다시 입력</button>
    </div>

    <!-- RESULT -->
    <div class="view" id="view-result">
      <p class="r-greeting">WELCOME</p>
      <p class="r-name" id="r-name"></p>
      <div class="r-seat-box">
        <p class="r-seat-label">YOUR SEAT NUMBER</p>
        <p class="r-seat-num" id="r-seat"></p>
        <p class="r-zone" id="r-zone"></p>
      </div>
      <div class="map-wrap">
        <p class="map-title">VENUE MAP</p>
        <div class="stage-bar">✦ &nbsp; STAGE &nbsp; ✦</div>
        <div class="seat-grid" id="seat-map"></div>
        <div class="map-legend">
          <div class="leg"><div class="leg-dot" style="background:#14182a;border:0.5px solid #242a50;"></div>Section A</div>
          <div class="leg"><div class="leg-dot" style="background:#142218;border:0.5px solid #244030;"></div>Section B</div>
          <div class="leg"><div class="leg-dot" style="background:#221414;border:0.5px solid #502424;"></div>Section C</div>
          <div class="leg"><div class="leg-dot" style="background:#c9a84c;"></div>내 좌석</div>
        </div>
      </div>
      <button class="back-btn" onclick="goAuth()">← 처음으로</button>
    </div>
  </div>

  <footer class="footer">© 2025 The Grand Awards · All rights reserved</footer>
</div>

<script>
// ══════════════════════════════════════════
//  ★ 참석자 데이터 — 이 부분만 수정하세요 ★
// ══════════════════════════════════════════
const guestData = [
  { name: "강현우", phone: "1234", seat: "A-05", zone: "Section A" },
  { name: "이서윤", phone: "5678", seat: "B-12", zone: "Section B" },
  { name: "김지민", phone: "1234", seat: "C-03", zone: "Section C" },
  // 여기에 참석자를 계속 추가하세요:
  // { name: "홍길동", phone: "0000", seat: "A-01", zone: "Section A" },
];

// ══════════════════════════════════════════
//  좌석 배치 정의 (row, col, zone)
//  실제 좌석 배치에 맞게 수정 가능합니다
// ══════════════════════════════════════════
const seatLayout = {};
['A-01','A-02','A-03','A-04','A-05','A-06'].forEach((id,i)=>{
  seatLayout[id]={row:0,col:i,zone:'a'};
});
['B-01','B-02','B-03','B-04','B-05','B-06',
 'B-07','B-08','B-09','B-10','B-11','B-12'].forEach((id,i)=>{
  seatLayout[id]={row:1,col:i,zone:'b'};
});
['C-01','C-02','C-03','C-04','C-05','C-06',
 'C-07','C-08','C-09','C-10','C-11','C-12'].forEach((id,i)=>{
  seatLayout[id]={row:2,col:i,zone:'c'};
});

// ── DOM refs ──
const inp    = document.getElementById('phone-input');
const btn    = document.getElementById('find-btn');
const errEl  = document.getElementById('err-msg');

// ── Input handler ──
inp.addEventListener('input', () => {
  const v = inp.value.replace(/\D/g, '').slice(0, 4);
  inp.value = v;
  [0,1,2,3].forEach(i => {
    document.getElementById('d'+i).classList.toggle('filled', i < v.length);
  });
  btn.classList.toggle('active', v.length === 4);
  errEl.textContent = '';
});

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && inp.value.length === 4) doFind();
});

// ── View switcher ──
function showView(id) {
  document.querySelectorAll('.view').forEach(v => {
    v.classList.remove('active');
  });
  const target = document.getElementById(id);
  target.classList.add('active');
}

// ── Find logic ──
function doFind() {
  const phone = inp.value;
  if (phone.length !== 4) { errEl.textContent = '4자리를 모두 입력해주세요.'; return; }
  const matches = guestData.filter(g => g.phone === phone);
  if (matches.length === 0) {
    errEl.textContent = '일치하는 등록 정보가 없습니다. 다시 확인해주세요.';
    return;
  }
  if (matches.length === 1) {
    showResult(matches[0]);
  } else {
    buildPickList(matches);
    showView('view-pick');
  }
}

// ── Build duplicate pick list ──
function buildPickList(matches) {
  const list = document.getElementById('pick-list');
  list.innerHTML = '';
  matches.forEach(g => {
    const masked = g.name.slice(0, 2) + '○'.repeat(Math.max(0, g.name.length - 2));
    const item = document.createElement('div');
    item.className = 'pick-item';
    item.innerHTML = `
      <div class="avatar">${g.name[0]}</div>
      <div>
        <div class="pick-name">${masked}</div>
        <div class="pick-hint">${g.zone} · ${g.seat.split('-')[0]}열</div>
      </div>
    `;
    item.onclick = () => showResult(g);
    list.appendChild(item);
  });
}

// ── Show result ──
function showResult(g) {
  document.getElementById('r-name').textContent = g.name + ' 님';
  document.getElementById('r-seat').textContent = g.seat;
  document.getElementById('r-zone').textContent = g.zone;
  buildMap(g.seat);
  showView('view-result');
}

// ── Build seat map ──
function buildMap(mySeat) {
  const rows = {};
  Object.entries(seatLayout).forEach(([id, info]) => {
    if (!rows[info.row]) rows[info.row] = [];
    rows[info.row].push({ id, col: info.col, zone: info.zone });
  });
  const mapEl = document.getElementById('seat-map');
  mapEl.innerHTML = '';
  Object.keys(rows).sort((a,b)=>a-b).forEach(r => {
    const rowEl = document.createElement('div');
    rowEl.className = 'seat-row';
    rows[r].sort((a,b)=>a.col-b.col).forEach(s => {
      const div = document.createElement('div');
      const isMe = s.id === mySeat;
      div.className = 'seat zone-' + s.zone + (isMe ? ' mine' : '');
      div.title = s.id;
      div.textContent = isMe ? '★' : '';
      rowEl.appendChild(div);
    });
    mapEl.appendChild(rowEl);
  });
}

// ── Reset ──
function goAuth() {
  inp.value = '';
  [0,1,2,3].forEach(i => document.getElementById('d'+i).classList.remove('filled'));
  btn.classList.remove('active');
  errEl.textContent = '';
  showView('view-auth');
}
</script>
</body>
</html>
