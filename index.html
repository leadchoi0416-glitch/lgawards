  :root {

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(201,168,76,.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 8%,  rgba(201,168,76,.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 60%, rgba(201,168,76,.20) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 42%, rgba(201,168,76,.30) 0%, transparent 100%),
      radial-gradient(1px 1px at 5%  80%, rgba(201,168,76,.20) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 90%, rgba(201,168,76,.18) 0%, transparent 100%),
      radial-gradient(1px 1px at 93% 75%, rgba(201,168,76,.25) 0%, transparent 100%);
    pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px 60px; }
  .header { text-align: center; margin-bottom: 40px; }
  .header-badge { display: inline-flex; align-items: center; gap: 8px; font-size: 10px; letter-spacing: 4px; color: var(--gold); margin-bottom: 14px; }
  .header-badge::before, .header-badge::after { content: ''; width: 30px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .header-badge::after { transform: scaleX(-1); }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 6vw, 42px); font-weight: 700; color: var(--text); line-height: 1.1; }
  .header-sub { font-size: 11px; letter-spacing: 5px; color: var(--text-muted); margin-top: 8px; }
  .ornament { display: flex; align-items: center; gap: 12px; justify-content: center; margin-top: 16px; color: var(--gold-dim); font-size: 12px; letter-spacing: 6px; }
  .ornament::before, .ornament::after { content: ''; width: 50px; height: 0.5px; background: linear-gradient(90deg, transparent, var(--gold-dim)); }
  .ornament::after { transform: scaleX(-1); }
  .card { width: 100%; max-width: 420px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 16px; padding: 32px 28px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .view { display: none; animation: fadeSlide .4s ease; }
  .view.active { display: block; }
  @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .view-label { font-size: 15px; letter-spacing: 2px; color: var(--text-muted); text-align: center; margin-bottom: 24px; font-family: 'Playfair Display', serif; font-weight: 600; }
  .dots-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid var(--text-dim); background: transparent; transition: all .25s ease; }
  .dot.filled { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,.4); }
  .inp-wrap { position: relative; margin-bottom: 24px; }
  .inp { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 32px; font-family: 'Playfair Display', serif; font-weight: 600; text-align: center; letter-spacing: 16px; padding: 20px 16px; outline: none; transition: border-color .2s; caret-color: var(--gold); }
  .inp::placeholder { color: var(--text-dim); letter-spacing: 8px; font-size: 24px; }
  .inp:focus { border-color: var(--border2); }
  .find-btn { width: 100%; padding: 18px; background: var(--gold); border: none; border-radius: 10px; color: #0b0b10; font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; letter-spacing: 3px; cursor: pointer; opacity: .4; pointer-events: none; transition: all .25s; }
  .find-btn.active { opacity: 1; pointer-events: all; }
  .find-btn.active:hover { background: var(--gold-light); transform: translateY(-1px); }
  .find-btn.active:active { transform: scale(.98); }
  .err { text-align: center; font-size: 12px; color: var(--red); margin-top: 14px; min-height: 18px; letter-spacing: 0.5px; }
  .pick-label { font-size: 11px; letter-spacing: 2px; color: var(--text-muted); text-align: center; margin-bottom: 20px; line-height: 1.6; }
  .pick-list { display: flex; flex-direction: column; gap: 10px; }
  .pick-item { background: var(--bg3); border: 0.5px solid var(--border); border-radius: 10px; padding: 18px 20px; cursor: pointer; display: flex; align-items: center; gap: 16px; transition: border-color .2s, background .2s; }
  .pick-item:hover { border-color: var(--border2); background: #1e1e2e; }
  .pick-item:active { transform: scale(.99); }
  .avatar { width: 44px; height: 44px; flex-shrink: 0; border-radius: 50%; background: rgba(201,168,76,.1); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); }
  .pick-name { font-size: 16px; font-weight: 500; color: var(--text); }
  .pick-hint { font-size: 11px; color: var(--text-muted); margin-top: 3px; letter-spacing: 1px; }
  .r-greeting { font-size: 10px; letter-spacing: 4px; color: var(--text-muted); text-align: center; margin-bottom: 6px; }
  .r-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 20px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
  .info-box { background: var(--bg3); border: 0.5px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; position: relative; overflow: hidden; }
  .info-box::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.06) 0%, transparent 70%); pointer-events: none; }
  .info-box.full { grid-column: 1 / -1; }
  .info-label { font-size: 9px; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 6px; }
  .info-value { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--gold); line-height: 1; text-shadow: 0 0 20px rgba(201,168,76,.25); }
  .info-value.sm { font-size: 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 500; letter-spacing: 0.5px; }
  .gift-box { background: var(--bg3); border: 0.5px solid rgba(201,168,76,.25); border-radius: 10px; padding: 16px; margin-bottom: 8px; text-align: center; position: relative; overflow: hidden; }
  .gift-box::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.06) 0%, transparent 70%); pointer-events: none; }
  .gift-label { font-size: 9px; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 6px; }
  .gift-value { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--gold); line-height: 1; text-shadow: 0 0 20px rgba(201,168,76,.25); }
  .back-btn { width: 100%; margin-top: 16px; padding: 12px; background: transparent; border: 0.5px solid var(--border); border-radius: 8px; color: var(--text-muted); font-size: 11px; letter-spacing: 2px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; }
  .back-btn:hover { border-color: var(--border2); color: var(--gold); }
  .footer { margin-top: 28px; text-align: center; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }
</style>

  </div>

  <footer class="footer">© 2026 LG Awards · All rights reserved</footer>
</div>

const inp = document.getElementById('phone-input');
const btn = document.getElementById('find-btn');
const errEl = document.getElementById('err-msg');

inp.addEventListener('input', () => {
  const v = inp.value.replace(/\D/g, '').slice(0, 4);
  inp.value = v;
  [0,1,2,3].forEach(i => document.getElementById('d'+i).classList.toggle('filled', i < v.length));
  btn.classList.toggle('active', v.length === 4);
  errEl.textContent = '';
});
inp.addEventListener('keydown', e => { if (e.key === 'Enter' && inp.value.length === 4) doFind(); });

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const t = document.getElementById(id);
  t.classList.add('active');
}

function doFind() {
  const phone = inp.value;
  if (phone.length !== 4) { errEl.textContent = '4자리를 모두 입력해주세요.'; return; }
  const matches = guestData.filter(g => g.phone === phone);
  if (matches.length === 0) { errEl.textContent = '일치하는 등록 정보가 없습니다. 다시 확인해주세요.'; return; }
  if (matches.length === 1) { showResult(matches[0]); return; }
  buildPickList(matches);
  showView('view-pick');
}

function buildPickList(matches) {
  const list = document.getElementById('pick-list');
  list.innerHTML = '';
  matches.forEach(g => {
    const masked = g.name.length > 1 ? g.name[0] + '○'.repeat(g.name.length - 1) : g.name;
    const item = document.createElement('div');
    item.className = 'pick-item';
    item.innerHTML = `<div class="avatar">${g.name[0]}</div><div><div class="pick-name">${masked}</div><div class="pick-hint">좌석 ${g.seat}</div></div>`;
    item.onclick = () => showResult(g);
    list.appendChild(item);
  });
}

function showResult(g) {
  document.getElementById('r-name').textContent = g.name + ' 님';
  document.getElementById('r-seat').textContent = g.seat;
  document.getElementById('r-gift').textContent = g.gift;
  showView('view-result');
}

function goAuth() {
  inp.value = '';
  [0,1,2,3].forEach(i => document.getElementById('d'+i).classList.remove('filled'));
  btn.classList.remove('active');
  errEl.textContent = '';
  showView('view-auth');
}
